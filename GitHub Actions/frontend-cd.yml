name: Frontend CD

# mainブランチへのpush時 かつ frontendフォルダに変更がある場合のみ実行
on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
  # AWS シークレット設定後に手動でデプロイする場合
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: internal-portal/frontend
  ECS_CLUSTER: internal-portal-cluster
  ECS_SERVICE: internal-portal-svc-frontend
  CONTAINER_NAME: frontend

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest

    # OIDCトークン取得に必要なパーミッション（アクセスキー不要）
    permissions:
      id-token: write
      contents: read

    steps:
      # =========================================
      # 1. コードチェックアウト
      # =========================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================================
      # 2. AWS シークレット設定確認
      #    未設定の場合は以降のステップをスキップして正常終了
      # =========================================
      - name: Check AWS credentials are configured
        id: check-aws
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::notice::AWS_OIDC_ROLE_ARN が未設定のためデプロイをスキップします。"
            echo "::notice::GitHub リポジトリの Settings > Secrets に AWS_OIDC_ROLE_ARN を設定してください。"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      # =========================================
      # 3. AWS認証（OIDC - アクセスキー不要）
      # =========================================
      - name: Configure AWS credentials via OIDC
        if: steps.check-aws.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================================
      # 4. ECRログイン
      # =========================================
      - name: Login to Amazon ECR
        if: steps.check-aws.outputs.configured == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =========================================
      # 5. Dockerイメージビルド & ECRにpush
      # =========================================
      - name: Build and push Docker image
        if: steps.check-aws.outputs.configured == 'true'
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # =========================================
      # 6. Trivyセキュリティスキャン（AWS推奨）
      #    HIGH・CRITICALの脆弱性があればデプロイ停止
      # =========================================
      - name: Run Trivy vulnerability scanner
        if: steps.check-aws.outputs.configured == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"

      # =========================================
      # 7. ECSタスク定義を最新イメージで更新
      # =========================================
      - name: Download current task definition
        if: steps.check-aws.outputs.configured == 'true'
        run: |
          aws ecs describe-task-definition \
            --task-definition internal-portal-frontend \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        if: steps.check-aws.outputs.configured == 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      # =========================================
      # 8. ECSへデプロイ
      # =========================================
      - name: Deploy to ECS
        if: steps.check-aws.outputs.configured == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # =========================================
      # 9. SNS通知（成功）
      # =========================================
      - name: Notify success via SNS
        if: steps.check-aws.outputs.configured == 'true' && success()
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_TOPIC_ARN }} \
            --subject "✅ [Frontend] デプロイ成功" \
            --message "リポジトリ: ${{ github.repository }}
          ブランチ: ${{ github.ref_name }}
          コミット: ${{ github.sha }}
          実行者: ${{ github.actor }}
          ステータス: 成功"

      # =========================================
      # 10. SNS通知（失敗）
      # =========================================
      - name: Notify failure via SNS
        if: steps.check-aws.outputs.configured == 'true' && failure()
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_TOPIC_ARN }} \
            --subject "❌ [Frontend] デプロイ失敗" \
            --message "リポジトリ: ${{ github.repository }}
          ブランチ: ${{ github.ref_name }}
          コミット: ${{ github.sha }}
          実行者: ${{ github.actor }}
          ステータス: 失敗
          確認URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
