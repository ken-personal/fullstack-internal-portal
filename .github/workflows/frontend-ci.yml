name: Frontend CI

# frontendフォルダに変更があった場合 or PRの時に実行
on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      # =========================================
      # 1. コードチェックアウト
      # =========================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================================
      # 2. Node.jsセットアップ
      # =========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # =========================================
      # 3. 依存関係インストール
      # =========================================
      - name: Install dependencies
        run: npm ci

      # =========================================
      # 4. ESLint チェック
      # =========================================
      - name: Run ESLint
        run: npm run lint

      # =========================================
      # 5. TypeScript 型チェック
      # =========================================
      - name: TypeScript type check
        run: npx tsc --noEmit

      # =========================================
      # 6. Jestユニットテスト
      # =========================================
      - name: Run tests
        run: npm test -- --passWithNoTests --ci
