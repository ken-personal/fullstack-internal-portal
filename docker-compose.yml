version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-nestjs:
    build: ./backend-nestjs
    container_name: backend-nestjs
    # 起動前にビルドして最新コードを反映させる
    command: sh -c "npx prisma generate && npm run build && npm run start:prod"
    env_file:
      - .env
    environment:
      - JWT_SECRET=supersecret
      - DATABASE_URL=postgresql://devuser:devpass@postgres:5432/devdb
    ports:
      - "3001:3000"
      - "5555:5555" # ✅ 修正ポイント：Prisma Studio用の窓を開放
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend-nestjs